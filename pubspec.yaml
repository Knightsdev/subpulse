name: subpulse
description: Track and save on your subscriptions - never forget to cancel again.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2
  flutter_local_notifications: ^16.3.0
  google_fonts: ^6.1.0
  intl: ^0.18.1
  uuid: ^4.2.2
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.4
  google_sign_in: ^6.2.1
  googleapis: ^11.2.0
  http: ^1.1.2
  shimmer: ^3.0.0
  fl_chart: ^0.66.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true
  
  assets:
    - assets/icons/
    - assets/images/